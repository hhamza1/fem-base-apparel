<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Base Apparel coming soon page</title>
</head>
<body>
  <header>
    <img src="images/logo.svg" alt="Base Apparel Logo">
  </header>
  <main>
    <div class="hero-container">
      <picture>
        <source media="(min-width:768px)" srcset="./images/hero-desktop.jpg">
        <source media="(min-width: 375px)" srcset="./images/hero-mobile.jpg">
        <img src="./images/hero-mobile.jpg" alt="Base Apparel Model" width="auto">
      </picture>
    </div>

    <div class="announcement">
      <h1 class="coming-soon">We're <span>coming soon</span></h1>
      <p>
        Hello fellow shoppers! We're currently building our new fashion store. 
        Add your email below to stay up-to-date with announcements and our launch deals.
      </p>
    </div>

    <form action="#">
      <div class="input-group">
        <input type="text" name="email" value="Email Address">
        <img src="./images/icon-error.svg" alt="Error" style="display: none;">
        <button>
          <img src="./images/icon-arrow.svg" class="submit-btn" alt="Submission button">
        </button>
      </div>
      
    </form>
  </main>
  
  <footer>
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://github.com/hhamza1">Hamza HMITOU</a>.
    </p>
  </footer>

  <script src="./js/main.js"></script>
</body>
</html>
